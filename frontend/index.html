<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园主干道人流车流分析系统 - 系统主页</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚦</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="layout">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🚦 交通分析系统</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/index.html" class="nav-item active">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">系统主页</span>
                </a>
                <a href="/analysis.html" class="nav-item">
                    <span class="nav-icon">🎥</span>
                    <span class="nav-text">视频分析</span>
                </a>
                <a href="/visualize.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">数据可视化</span>
                </a>
                <a href="/ai.html" class="nav-item">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-text">AI分析</span>
                </a>
                <a href="/history.html" class="nav-item">
                    <span class="nav-icon">📁</span>
                    <span class="nav-text">历史数据</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <h2>系统主页</h2>
                <p class="subtitle">实时监控校园主干道交通状况</p>
            </header>

            <!-- 统计卡片 -->
            <section class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon blue">👥</div>
                    <div class="stat-info">
                        <h4>今日人流量</h4>
                        <div>
                            <span class="stat-value" id="today-person">--</span>
                            <span class="stat-unit">人次</span>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">🚗</div>
                    <div class="stat-info">
                        <h4>今日车流量</h4>
                        <div>
                            <span class="stat-value" id="today-vehicle">--</span>
                            <span class="stat-unit">辆次</span>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">⚡</div>
                    <div class="stat-info">
                        <h4>平均速度</h4>
                        <div>
                            <span class="stat-value" id="avg-speed">--</span>
                            <span class="stat-unit">px/s</span>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple">📈</div>
                    <div class="stat-info">
                        <h4>交通密度</h4>
                        <div>
                            <span class="stat-value" id="density">--</span>
                            <span class="stat-unit">目标/像素²</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 趋势图表 -->
            <section class="card">
                <div class="card-header">
                    <h3>今日交通流量趋势</h3>
                    <div style="display: flex; gap: 16px; align-items: center;">
                        <span class="legend-item">
                            <span class="legend-color" style="background: #5470c6;"></span>
                            人流量
                        </span>
                        <span class="legend-item">
                            <span class="legend-color" style="background: #91cc75;"></span>
                            车流量
                        </span>
                    </div>
                </div>
                <div id="trend-chart" style="height: 400px;"></div>
            </section>

            <!-- AI分析快捷入口 -->
            <section class="card">
                <div class="card-header">
                    <h3>🤖 AI智能分析</h3>
                    <p style="color: #909399; font-size: 13px;">点击快速获取交通分析结果</p>
                </div>
                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="quickAnalysis('peak')">
                        <span>📊</span> 分析高峰期
                    </button>
                    <button class="btn btn-success" onclick="quickAnalysis('trend')">
                        <span>📈</span> 分析交通趋势
                    </button>
                    <button class="btn btn-warning" onclick="quickAnalysis('ratio')">
                        <span>⚖️</span> 分析人车比例
                    </button>
                </div>
                <!-- AI结果显示 -->
                <div id="ai-result" style="display: none; margin-top: 20px; padding: 16px; background: #f5f7fa; border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <span style="font-weight: 600;">🤖 AI分析结果</span>
                        <button class="btn btn-default" onclick="closeAiResult()" style="padding: 4px 12px; font-size: 12px;">✕</button>
                    </div>
                    <div id="ai-result-content" style="line-height: 1.8; color: #606266;"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/utils.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            highlightCurrentNav();
            loadDashboardData();
        });

        // 加载仪表盘数据
        async function loadDashboardData() {
            try {
                const data = await get('/api/dashboard');
                
                // 更新统计卡片
                document.getElementById('today-person').textContent = data.today?.total_person || 0;
                document.getElementById('today-vehicle').textContent = data.today?.total_vehicle || 0;
                document.getElementById('avg-speed').textContent = (data.today?.avg_speed || 0).toFixed(1);
                document.getElementById('density').textContent = (data.today?.avg_density || 0).toFixed(4);
                
                // 渲染趋势图
                renderTrendChart(data.hourly_data);
            } catch (error) {
                console.error('加载数据失败:', error);
                showMessage('加载数据失败', 'error');
            }
        }

        // 渲染趋势图
        function renderTrendChart(data) {
            const chart = createChart('trend-chart');
            if (!chart) return;
            
            const times = data?.map(item => item.time) || [];
            const persons = data?.map(item => item.person) || [];
            const vehicles = data?.map(item => item.vehicle) || [];
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: times
                },
                yAxis: {
                    type: 'value',
                    name: '数量'
                },
                series: [
                    {
                        name: '人流量',
                        type: 'line',
                        smooth: true,
                        data: persons,
                        itemStyle: { color: '#5470c6' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(84,112,198,0.3)' },
                                { offset: 1, color: 'rgba(84,112,198,0.05)' }
                            ])
                        }
                    },
                    {
                        name: '车流量',
                        type: 'line',
                        smooth: true,
                        data: vehicles,
                        itemStyle: { color: '#91cc75' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(145,204,117,0.3)' },
                                { offset: 1, color: 'rgba(145,204,117,0.05)' }
                            ])
                        }
                    }
                ]
            };
            
            chart.setOption(option);
            makeChartResponsive(chart);
        }

        // AI快捷分析
        async function quickAnalysis(type) {
            const resultEl = document.getElementById('ai-result');
            const contentEl = document.getElementById('ai-result-content');
            
            resultEl.style.display = 'block';
            contentEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI分析中...</div>';
            
            try {
                const result = await post('/api/ai_quick_analysis', { analysis_type: type });
                contentEl.innerHTML = renderMarkdown(result.answer);
            } catch (error) {
                contentEl.innerHTML = `<p style="color: #f56c6c;">分析失败: ${error.message}</p>`;
            }
        }

        // 关闭AI结果
        function closeAiResult() {
            document.getElementById('ai-result').style.display = 'none';
        }

        // Markdown渲染
        function renderMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/^### (.*$)/gim, '<h3 style="margin: 12px 0; color: #303133;">$1</h3>')
                .replace(/^## (.*$)/gim, '<h2 style="margin: 16px 0; color: #303133;">$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong style="color: #409EFF;">$1</strong>')
                .replace(/^- (.*$)/gim, '<li style="margin: 6px 0;">$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, '<ul style="margin: 12px 0; padding-left: 20px;">$&</ul>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
