    <script src="/static/js/utils.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            highlightCurrentNav();
            loadDashboardData();
        });

        // 加载仪表盘数据
        async function loadDashboardData() {
            try {
                const data = await get('/api/dashboard');
                
                // 更新统计卡片
                document.getElementById('today-person').textContent = data.today?.total_person || 0;
                document.getElementById('today-vehicle').textContent = data.today?.total_vehicle || 0;
                document.getElementById('avg-speed').textContent = (data.today?.avg_speed || 0).toFixed(1);
                document.getElementById('density').textContent = (data.today?.avg_density || 0).toFixed(4);
                
                // 渲染趋势图
                renderTrendChart(data.hourly_data);
            } catch (error) {
                console.error('加载数据失败:', error);
                showMessage('加载数据失败', 'error');
            }
        }

        // 渲染趋势图
        function renderTrendChart(data) {
            const chart = createChart('trend-chart');
            if (!chart) return;
            
            // 将每分钟数据聚合为每 30 分钟数据
            const aggregatedData = aggregateToHalfHourly(data);
            
            const times = aggregatedData?.map(item => item.time) || [];
            const persons = aggregatedData?.map(item => item.person) || [];
            const vehicles = aggregatedData?.map(item => item.vehicle) || [];
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                legend: {
                    show: false
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: times,
                    axisLabel: {
                        interval: 'auto',
                        rotate: 0
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '数量'
                },
                series: [
                    {
                        name: '人流量',
                        type: 'line',
                        smooth: false,
                        data: persons,
                        itemStyle: { color: '#578ddd' },
                        lineStyle: {
                            width: 3,
                            color: '#578ddd'
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(87,141,221,0.3)' },
                                { offset: 1, color: 'rgba(87,141,221,0.05)' }
                            ])
                        }
                    },
                    {
                        name: '车流量',
                        type: 'line',
                        smooth: false,
                        data: vehicles,
                        itemStyle: { color: '#eaa062' },
                        lineStyle: {
                            width: 3,
                            color: '#eaa062'
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(234,160,98,0.3)' },
                                { offset: 1, color: 'rgba(234,160,98,0.05)' }
                            ])
                        }
                    }
                ]
            };
            
            chart.setOption(option);
            makeChartResponsive(chart);
        }

        // 将每分钟数据聚合为每 30 分钟数据
        function aggregateToHalfHourly(data) {
            if (!data || data.length === 0) return [];
                    
            const aggregated = {};
                    
            data.forEach(item => {
                const time = item.time;
                const hour = parseInt(time.split(':')[0]);
                const minute = parseInt(time.split(':')[1]);
                        
                // 确定属于哪个 30 分钟时段（0-29 分为前半段，30-59 分为后半段）
                const halfHour = minute < 30 ? '00' : '30';
                const timeKey = `${hour.toString().padStart(2, '0')}:${halfHour}`;
                        
                if (!aggregated[timeKey]) {
                    aggregated[timeKey] = {
                        time: timeKey,
                        person: 0,
                        vehicle: 0,
                        total: 0
                    };
                }
                        
                aggregated[timeKey].person += item.person || 0;
                aggregated[timeKey].vehicle += item.vehicle || 0;
                aggregated[timeKey].total += item.total || 0;
            });
                    
            // 转换为数组并按时间排序
            return Object.values(aggregated).sort((a, b) => a.time.localeCompare(b.time));
        }
        
        // AI 快捷分析
        async function quickAnalysis(type) {
            const resultEl = document.getElementById('ai-result');
            const contentEl = document.getElementById('ai-result-content');
            
            resultEl.style.display = 'block';
            contentEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI分析中...</div>';
            
            try {
                const result = await post('/api/ai_quick_analysis', { analysis_type: type });
                contentEl.innerHTML = renderMarkdown(result.answer);
            } catch (error) {
                contentEl.innerHTML = `<p style="color: #f56c6c;">分析失败: ${error.message}</p>`;
            }
        }

        // 关闭AI结果
        function closeAiResult() {
            document.getElementById('ai-result').style.display = 'none';
        }

        // Markdown渲染
        function renderMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/^### (.*$)/gim, '<h3 style="margin: 12px 0; color: #303133;">$1</h3>')
                .replace(/^## (.*$)/gim, '<h2 style="margin: 16px 0; color: #303133;">$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong style="color: #409EFF;">$1</strong>')
                .replace(/^- (.*$)/gim, '<li style="margin: 6px 0;">$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, '<ul style="margin: 12px 0; padding-left: 20px;">$&</ul>')
                .replace(/\n/g, '<br>');
        }
    </script>
