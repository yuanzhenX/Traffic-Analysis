<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化 - 校园主干道人流车流分析系统</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="layout">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🚦 交通分析系统</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/index.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">系统主页</span>
                </a>
                <a href="/analysis.html" class="nav-item">
                    <span class="nav-icon">🎥</span>
                    <span class="nav-text">视频分析</span>
                </a>
                <a href="/visualize.html" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">数据可视化</span>
                </a>
                <a href="/ai.html" class="nav-item">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-text">AI分析</span>
                </a>
                <a href="/history.html" class="nav-item">
                    <span class="nav-icon">📁</span>
                    <span class="nav-text">历史数据</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <h2>数据可视化</h2>
                <p class="subtitle">多维度交通数据分析与展示</p>
            </header>

            <!-- 图表网格 -->
            <div class="charts-grid">
                <!-- 流量趋势图 -->
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>📈 今日人流/车流趋势</h3>
                    </div>
                    <div id="trend-chart" class="chart-body"></div>
                </div>

                <!-- 密度变化图 -->
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>📊 今日交通密度变化</h3>
                    </div>
                    <div id="density-chart" class="chart-body"></div>
                </div>

                <!-- 速度变化图 -->
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>⚡ 今日平均速度变化</h3>
                    </div>
                    <div id="speed-chart" class="chart-body"></div>
                </div>

                <!-- 人车比例图 -->
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>⚖️ 人车比例</h3>
                    </div>
                    <div id="ratio-chart" class="chart-body"></div>
                </div>
            </div>

            <!-- 热力图区域 -->
            <div class="heatmap-section">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>🔥 今日交通热力图</h3>
                    </div>
                    <div id="heatmap-chart" class="heatmap-body"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/utils.js"></script>
    <script>
        // 图表实例
        let charts = {};

        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            highlightCurrentNav();
            initCharts();
            loadAllCharts();
        });

        // 初始化图表
        function initCharts() {
            charts.trend = createChart('trend-chart');
            charts.density = createChart('density-chart');
            charts.speed = createChart('speed-chart');
            charts.ratio = createChart('ratio-chart');
            charts.heatmap = createChart('heatmap-chart');
            
            // 响应式
            window.addEventListener('resize', () => {
                Object.values(charts).forEach(chart => chart && chart.resize());
            });
        }

        // 加载所有图表
        async function loadAllCharts() {
            const { startTime, endTime } = getTodayRange();
            
            try {
                await Promise.all([
                    loadTrendChart(startTime, endTime),
                    loadDensityChart(startTime, endTime),
                    loadSpeedChart(startTime, endTime),
                    loadRatioChart(),
                    loadHeatmap(startTime, endTime)
                ]);
            } catch (error) {
                console.error('加载图表失败:', error);
                showMessage('部分图表加载失败', 'warning');
            }
        }

        // 加载趋势图
        async function loadTrendChart(startTime, endTime) {
            try {
                const data = await get(`/api/traffic_stats?start_time=${startTime.toISOString()}&end_time=${endTime.toISOString()}`);
                
                const times = data.stats?.map(s => s.time_slot?.substring(11, 16)) || [];
                const persons = data.stats?.map(s => s.person_count) || [];
                const vehicles = data.stats?.map(s => s.vehicle_count) || [];

                charts.trend.setOption({
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['人流量', '车流量'] },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', boundaryGap: false, data: times },
                    yAxis: { type: 'value', name: '数量' },
                    series: [
                        {
                            name: '人流量',
                            type: 'line',
                            smooth: true,
                            data: persons,
                            itemStyle: { color: '#5470c6' }
                        },
                        {
                            name: '车流量',
                            type: 'line',
                            smooth: true,
                            data: vehicles,
                            itemStyle: { color: '#91cc75' }
                        }
                    ]
                }, true);
            } catch (error) {
                console.error('趋势图加载失败:', error);
            }
        }

        // 加载密度图
        async function loadDensityChart(startTime, endTime) {
            try {
                const data = await get(`/api/traffic_stats?start_time=${startTime.toISOString()}&end_time=${endTime.toISOString()}`);
                
                const times = data.stats?.map(s => s.time_slot?.substring(11, 16)) || [];
                const densities = data.stats?.map(s => parseFloat((s.density * 100000000).toFixed(2))) || [];

                charts.density.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: times },
                    yAxis: { type: 'value', name: '密度 (×10⁻⁸)' },
                    series: [{
                        type: 'line',
                        smooth: true,
                        data: densities,
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(255, 152, 0, 0.5)' },
                                { offset: 1, color: 'rgba(255, 152, 0, 0.1)' }
                            ])
                        },
                        itemStyle: { color: '#ff9800' }
                    }]
                }, true);
            } catch (error) {
                console.error('密度图加载失败:', error);
            }
        }

        // 加载速度图
        async function loadSpeedChart(startTime, endTime) {
            try {
                const data = await get(`/api/traffic_stats?start_time=${startTime.toISOString()}&end_time=${endTime.toISOString()}`);
                
                const times = data.stats?.map(s => s.time_slot?.substring(11, 16)) || [];
                const speeds = data.stats?.map(s => s.avg_speed) || [];

                charts.speed.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: times },
                    yAxis: { type: 'value', name: '速度 (px/s)' },
                    series: [{
                        type: 'line',
                        smooth: true,
                        data: speeds,
                        itemStyle: { color: '#9c27b0' },
                        markLine: {
                            data: [{ type: 'average', name: '平均值' }]
                        }
                    }]
                }, true);
            } catch (error) {
                console.error('速度图加载失败:', error);
            }
        }

        // 加载比例图
        async function loadRatioChart() {
            try {
                const data = await get('/api/ratio');

                charts.ratio.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                    legend: { orient: 'vertical', left: 'left' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: { show: true, formatter: '{b}\n{d}%' },
                        data: [
                            { value: data.person_count || 0, name: '行人', itemStyle: { color: '#5470c6' } },
                            { value: data.vehicle_count || 0, name: '车辆', itemStyle: { color: '#91cc75' } }
                        ]
                    }]
                }, true);
            } catch (error) {
                console.error('比例图加载失败:', error);
            }
        }

        // 加载热力图
        async function loadHeatmap(startTime, endTime) {
            try {
                const data = await get(`/api/heatmap?start_time=${startTime.toISOString()}&end_time=${endTime.toISOString()}`);

                // 转换热力图数据
                const heatmapData = [];
                if (data.data) {
                    for (let y = 0; y < data.data.length; y++) {
                        for (let x = 0; x < data.data[y].length; x++) {
                            if (data.data[y][x] > 0) {
                                heatmapData.push([x, y, data.data[y][x]]);
                            }
                        }
                    }
                }

                const width = data.width || 100;
                const height = data.height || 100;
                const gridSize = data.grid_size || 10;

                charts.heatmap.setOption({
                    tooltip: { position: 'top' },
                    grid: { height: '80%', top: '10%' },
                    xAxis: {
                        type: 'category',
                        show: false,
                        data: Array.from({ length: Math.ceil(width / gridSize) }, (_, i) => i)
                    },
                    yAxis: {
                        type: 'category',
                        show: false,
                        data: Array.from({ length: Math.ceil(height / gridSize) }, (_, i) => i)
                    },
                    visualMap: {
                        min: 0,
                        max: 1,
                        calculable: true,
                        orient: 'horizontal',
                        left: 'center',
                        bottom: '0%',
                        inRange: {
                            color: ['#313695', '#4575b4', '#74add1', '#abd9e9', '#e0f3f8', '#fee090', '#fdae61', '#f46d43', '#d73027', '#a50026']
                        }
                    },
                    series: [{
                        type: 'heatmap',
                        data: heatmapData,
                        emphasis: {
                            itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' }
                        }
                    }]
                }, true);
            } catch (error) {
                console.error('热力图加载失败:', error);
            }
        }
    </script>
</body>
</html>
